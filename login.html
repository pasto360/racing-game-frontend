<!DOCTYPE html>
<html lang="it">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Garage Racing Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏎️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --accent-red: #ff3333;
            --accent-yellow: #ffd700;
            --accent-cyan: #00d9ff;
            --accent-green: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 51, 51, 0.03) 2px, rgba(255, 51, 51, 0.03) 4px);
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            background: var(--bg-card);
            border: 3px solid var(--accent-red);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 0 100px rgba(255, 51, 51, 0.3);
            position: relative;
            z-index: 2;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(135deg, var(--accent-red), #cc0000);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.6);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #333;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #333, #555);
        }

        .btn-secondary:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .message.error {
            background: rgba(255, 51, 51, 0.2);
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
            display: block;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            display: block;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .toggle-form a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script src="supabase-client.js"></script>
    <script src="supabase-direct.js"></script>

    <div class="login-container">
        <h1>🏎️ Racing Game</h1>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Il tuo username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="La tua password" autocomplete="current-password">
            </div>
            <button class="btn" onclick="handleLogin()">Login</button>
            <div class="toggle-form">
                Non hai un account? <a onclick="showRegisterForm()">Registrati</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" placeholder="Scegli un username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Minimo 6 caratteri" autocomplete="new-password">
            </div>
            <button class="btn" onclick="handleRegister()">Registrati</button>
            <div class="toggle-form">
                Hai già un account? <a onclick="showLoginForm()">Login</a>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        console.log('🔍 Controllo sessione esistente...');
        
        // Se già loggato, vai al gioco
        const session = getSession();
        if (session) {
            console.log('✅ Sessione trovata, reindirizzo a index.html');
            window.location.href = 'index.html';
        }

        function showMessage(text, isError = false) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + (isError ? 'error' : 'success');
        }

        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('message').className = 'message';
        }

        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('message').className = 'message';
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('Compila tutti i campi!', true);
                return;
            }

            showMessage('Login in corso...');

            try {
                const result = await loginDirect(username, password);
                
                if (result.success) {
                    showMessage('✅ Login riuscito! Reindirizzamento...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    showMessage(result.error || 'Credenziali non valide', true);
                }
            } catch (error) {
                console.error('Errore login:', error);
                showMessage('Errore durante il login', true);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !password) {
                showMessage('Compila tutti i campi!', true);
                return;
            }

            if (username.length < 3) {
                showMessage('Username troppo corto (minimo 3 caratteri)', true);
                return;
            }

            if (password.length < 6) {
                showMessage('Password troppo corta (minimo 6 caratteri)', true);
                return;
            }

            showMessage('Registrazione in corso...');

            try {
                const result = await registerDirect(username, password);
                
                if (result.success) {
                    showMessage('✅ Registrazione completata! Effettuo login...');
                    
                    // Auto-login dopo registrazione
                    setTimeout(async () => {
                        const loginResult = await loginDirect(username, password);
                        if (loginResult.success) {
                            window.location.href = 'index.html';
                        } else {
                            showMessage('Registrazione riuscita! Ora fai login.', false);
                            showLoginForm();
                        }
                    }, 1000);
                } else {
                    showMessage(result.error || 'Errore durante la registrazione', true);
                }
            } catch (error) {
                console.error('Errore registrazione:', error);
                showMessage('Errore durante la registrazione', true);
            }
        }

        // Enter per submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const loginVisible = document.getElementById('loginForm').style.display !== 'none';
                if (loginVisible) {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });
    </script>
</body>
</html>
