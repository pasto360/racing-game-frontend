<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Racing Game</title>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .form-section {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .switch-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .switch-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏎️ Racing Game</h1>
            <p>Il tuo simulatore di corse definitivo</p>
        </div>

        <!-- SEZIONE LOGIN -->
        <div id="login-section" class="form-section">
            <div class="error-message" id="login-error"></div>
            <div class="loading" id="login-loading">Accesso in corso...</div>
            
            <form id="login-form" onsubmit="login(event)">
                <div class="form-group">
                    <label for="email">📧 Email</label>
                    <input type="email" id="email" placeholder="La tua email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Password</label>
                    <input type="password" id="password" placeholder="La tua password" required>
                </div>
                
                <button type="submit" class="btn">Accedi</button>
            </form>
            
            <div class="switch-text">
                Non hai un account? <a onclick="showRegister()">Registrati</a>
            </div>
        </div>

        <!-- SEZIONE REGISTRAZIONE -->
        <div id="register-section" class="form-section" style="display: none;">
            <div class="error-message" id="register-error"></div>
            <div class="success-message" id="register-success"></div>
            <div class="loading" id="register-loading">Registrazione in corso...</div>
            
            <form id="register-form" onsubmit="register(event)">
                <div class="form-group">
                    <label for="reg-username">👤 Username</label>
                    <input type="text" id="reg-username" placeholder="Scegli un username" required minlength="3">
                </div>
                
                <div class="form-group">
                    <label for="reg-email">📧 Email</label>
                    <input type="email" id="reg-email" placeholder="La tua email" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">🔒 Password</label>
                    <input type="password" id="reg-password" placeholder="Crea una password" required minlength="6">
                </div>
                
                <button type="submit" class="btn">Registrati</button>
            </form>
            
            <div class="switch-text">
                Hai già un account? <a onclick="showLogin()">Accedi</a>
            </div>
        </div>
    </div>

    <!-- Supabase Client -->
        <script src="supabase-client.js"></script>
        <script src="supabase-direct.js"></script>

    <script>
        // Switch tra Login e Registrazione
        function showRegister() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
            clearMessages();
        }

        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
            clearMessages();
        }

        function clearMessages() {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
            document.getElementById('register-success').style.display = 'none';
        }

        // ========================================
        // LOGIN
        // ========================================
        async function login(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const loadingDiv = document.getElementById('login-loading');
            const form = document.getElementById('login-form');
            
            if (!email || !password) {
                errorDiv.textContent = '⚠️ Inserisci email e password';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Mostra loading
            form.style.display = 'none';
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            try {
                // ✅ USA SUPABASE
                const result = await loginDirect(email, password);
                
                if (result) {
                    console.log('✅ Login completato, redirect...');
                    window.location.href = 'index.html';
                } else {
                    throw new Error('Login fallito');
                }
                
            } catch (error) {
                console.error('❌ Errore login:', error);
                errorDiv.textContent = '❌ Email o password errati';
                errorDiv.style.display = 'block';
                form.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // ========================================
        // REGISTRAZIONE
        // ========================================
        async function register(event) {
            event.preventDefault();
            
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');
            const loadingDiv = document.getElementById('register-loading');
            const form = document.getElementById('register-form');
            
            if (!username || !email || !password) {
                errorDiv.textContent = '⚠️ Compila tutti i campi';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = '⚠️ La password deve essere di almeno 6 caratteri';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Mostra loading
            form.style.display = 'none';
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                // ✅ USA SUPABASE
                const success = await registerWithSupabase(username, email, password);
                
                if (success) {
                    successDiv.textContent = '✅ Registrazione completata! Ora puoi effettuare il login.';
                    successDiv.style.display = 'block';
                    loadingDiv.style.display = 'none';
                    
                    // Reset form
                    document.getElementById('register-form').reset();
                    
                    // Torna al login dopo 2 secondi
                    setTimeout(() => {
                        showLogin();
                    }, 2000);
                } else {
                    throw new Error('Registrazione fallita');
                }
                
            } catch (error) {
                console.error('❌ Errore registrazione:', error);
                errorDiv.textContent = '❌ Errore: ' + (error.message || 'Registrazione fallita');
                errorDiv.style.display = 'block';
                form.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // ========================================
        // CHECK SE GIÀ LOGGATO
        // ========================================
        window.addEventListener('load', async () => {
            console.log('🔍 Controllo sessione esistente...');
            
            // Controlla se c'è già un token
            const token = localStorage.getItem('authToken');
            
            if (token) {
                // Verifica se è ancora valido
                const { data: { session } } = await window.supabase.auth.getSession();
                
                if (session) {
                    console.log('✅ Sessione valida trovata, redirect...');
                    window.location.href = 'index.html';
                } else {
                    // Token scaduto, rimuovi
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('user');
                }
            }
        });
    </script>
</body>
</html>
