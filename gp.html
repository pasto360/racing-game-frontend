<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Gare 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0; color: #1a1a1a; min-height: 100vh;
  }

  /* HEADER */
  header {
    background: #1a1a1a; color: #fff;
    padding: 0 20px; display: flex; align-items: center;
    justify-content: space-between; height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: baseline; gap: 8px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { font-size: 13px; color: #888; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .sync-badge {
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px; font-weight: 500;
  }
  .sync-ok      { background: rgba(46,160,67,0.25);  color: #a3f0b0; }
  .sync-saving  { background: rgba(255,200,0,0.2);   color: #ffd96a; }
  .sync-error   { background: rgba(255,80,80,0.2);   color: #ff9a9a; }
  .sync-loading { background: rgba(255,255,255,0.1); color: #aaa; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-dot.pulsing { animation: pulse 1s infinite; }

  .btn-manage {
    background: rgba(255,255,255,0.12); border: none; color: #fff;
    padding: 7px 13px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .btn-manage:hover { background: rgba(255,255,255,0.2); }

  /* MAIN */
  .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .section-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: #888;
  }

  /* CLASSIFICA */
  .standings-card {
    background: #fff; border-radius: 16px; overflow: hidden;
    border: 1px solid #e8e6e0; margin-bottom: 12px;
  }
  .standings-row {
    display: grid; grid-template-columns: 48px 1fr 100px;
    align-items: center; padding: 14px 20px;
    border-bottom: 1px solid #f0ede6;
  }
  .standings-row:last-child { border-bottom: none; }
  .standings-row.leader { background: #fffbe6; }
  .pos { font-size: 20px; font-weight: 700; color: #ccc; }
  .pos.first  { color: #d4a017; }
  .pos.second { color: #999; }
  .driver-name { font-size: 17px; font-weight: 600; }
  .driver-sub  { font-size: 12px; color: #999; margin-top: 2px; }
  .pts { text-align: right; font-size: 24px; font-weight: 700; }
  .pts span { font-size: 12px; font-weight: 400; color: #999; }

  .progress-bar { height: 5px; background: #e8e6e0; border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 3px; transition: width 0.5s ease; }
  .progress-label { font-size: 12px; color: #aaa; margin-top: 5px; text-align: right; }

  /* GRAFICO */
  .chart-card {
    background: #fff; border-radius: 16px; border: 1px solid #e8e6e0;
    padding: 18px 20px 14px; margin-bottom: 28px;
  }
  .chart-legend { display: flex; gap: 18px; margin-bottom: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; color: #555; }
  .legend-dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .chart-wrap  { position: relative; height: 240px; }
  #chart-canvas { width: 100%; display: block; }

  /* GARE GRID */
  .races-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px; margin-bottom: 12px;
  }
  .race-card {
    background: #fff; border-radius: 16px; border: 1px solid #e8e6e0;
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .race-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .race-img-wrap {
    width: 100%; height: 130px; background: #e8e6e0; overflow: hidden;
  }
  .race-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.3s; pointer-events: none;
  }
  .race-card:hover .race-img-wrap img { transform: scale(1.03); }
  .race-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; background: #f0ede6;
  }
  .race-content { padding: 12px 14px; }
  .race-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .race-num-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #bbb; text-transform: uppercase; }
  .race-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .result-block { padding: 8px 0 0; border-top: 1px solid #f0ede6; }
  .result-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; }
  .result-pos-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    font-size: 11px; font-weight: 700; margin-right: 7px; flex-shrink: 0;
  }
  .badge-1 { background: #fff3cd; color: #856404; }
  .badge-2 { background: #ebebeb; color: #555; }
  .result-driver { font-size: 14px; font-weight: 500; }
  .result-pts      { font-size: 12px; color: #bbb; }
  .result-pts.gold { color: #d4a017; font-weight: 700; }
  .no-result { font-size: 13px; color: #ccc; padding: 6px 0; text-align: center; }
  .race-footer { padding: 10px 14px; border-top: 1px solid #f0ede6; }
  .btn-result {
    width: 100%; padding: 9px; border-radius: 10px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: opacity 0.15s; background: #1a1a1a; color: #fff;
  }
  .btn-result:hover { opacity: 0.82; }
  .btn-result.has-result { background: #f0ede6; color: #555; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; padding: 3px 7px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-done    { background: #e8f5e9; color: #2e7d32; }
  .status-pending { background: #f3f4f6; color: #aaa; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* MODAL base */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 200; align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0; width: 100%;
    max-width: 500px; padding: 24px 24px 36px; position: relative;
    max-height: 92vh; overflow-y: auto;
  }
  @media (min-width: 520px) {
    .modal-overlay { align-items: center; padding: 20px; }
    .modal { border-radius: 18px; max-width: 440px; }
  }
  .modal-drag-bar {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 0 auto 20px;
  }
  @media (min-width: 520px) { .modal-drag-bar { display: none; } }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
  .modal .modal-sub { font-size: 13px; color: #aaa; margin-bottom: 20px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
    border-radius: 50%; border: none; background: #f0ede6; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center; color: #555;
  }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
  .field { margin-bottom: 14px; }
  input[type="text"], select {
    width: 100%; padding: 11px 12px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 15px; outline: none; background: #fff; cursor: pointer;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus { border-color: #1a1a1a; }
  .btn-primary {
    width: 100%; padding: 13px; background: #1a1a1a; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* IMAGE PICKER */
  .img-picker-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px;
  }
  .img-picker-item {
    border: 2px solid #e8e6e0; border-radius: 10px; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s; position: relative;
  }
  .img-picker-item.selected { border-color: #1a1a1a; }
  .img-picker-item img { width: 100%; height: 60px; object-fit: cover; display: block; }
  .img-picker-item .img-label {
    font-size: 10px; font-weight: 600; text-align: center;
    padding: 4px 2px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .img-picker-item.selected .img-label { color: #1a1a1a; }
  .img-picker-check {
    display: none; position: absolute; top: 4px; right: 4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #1a1a1a; color: #fff; font-size: 11px;
    align-items: center; justify-content: center;
  }
  .img-picker-item.selected .img-picker-check { display: flex; }

  /* PANNELLO GESTIONE — slide-up panel */
  .manage-panel {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 300; align-items: flex-end; justify-content: center;
  }
  .manage-panel.open { display: flex; }
  .manage-inner {
    background: #fff; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 520px;
    max-height: 88vh; display: flex; flex-direction: column;
  }
  .manage-header {
    padding: 16px 20px 12px; border-bottom: 1px solid #f0ede6;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .manage-header h2 { font-size: 17px; font-weight: 700; }
  .manage-drag-bar {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 12px auto 0; flex-shrink: 0;
  }
  .manage-body { overflow-y: auto; flex: 1; padding: 12px 16px 20px; }
  .manage-hint { font-size: 12px; color: #aaa; margin-bottom: 12px; text-align: center; }

  /* SORTABLE LIST nel pannello gestione */
  .sort-list { list-style: none; }
  .sort-item {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 1px solid #e8e6e0; border-radius: 12px;
    padding: 10px 12px; margin-bottom: 8px;
    touch-action: none;
    user-select: none;
  }
  .sort-item.dragging-sort { opacity: 0.4; }
  .sort-item.drag-over-sort { border: 2px dashed #1a1a1a; background: #f8f7f4; }
  .sort-handle {
    font-size: 18px; color: #ccc; cursor: grab; flex-shrink: 0;
    padding: 4px 2px; touch-action: none;
  }
  .sort-thumb {
    width: 44px; height: 32px; border-radius: 6px; object-fit: cover;
    background: #f0ede6; flex-shrink: 0; overflow: hidden;
  }
  .sort-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .sort-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .sort-name { flex: 1; font-size: 14px; font-weight: 500; }
  .sort-num  { font-size: 12px; font-weight: 700; color: #bbb; min-width: 24px; text-align: right; }

  .manage-add-btn {
    width: 100%; padding: 12px; border: 2px dashed #d0cdc5; background: transparent;
    border-radius: 12px; font-size: 14px; font-weight: 600; color: #aaa;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 4px; transition: all 0.2s;
  }
  .manage-add-btn:hover { border-color: #999; color: #555; background: #faf9f6; }

  /* LOADING */
  .loading-overlay {
    display: none; position: fixed; inset: 0; background: rgba(245,244,240,0.92);
    z-index: 400; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  .loading-overlay.open { display: flex; }
  .spinner {
    width: 38px; height: 38px; border: 3px solid #ddd;
    border-top-color: #1a1a1a; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 30px;
    font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s ease; z-index: 600;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .races-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="loading-overlay open" id="loading-overlay">
  <div class="spinner"></div>
  <span style="font-size:14px;color:#888;">Caricamento campionato...</span>
</div>

<header>
  <div class="header-left">
    <h1 id="hdr-title">10 Gare</h1>
    <span class="subtitle" id="hdr-season">2026</span>
  </div>
  <div class="header-right">
    <div class="sync-badge sync-loading" id="sync-badge">
      <span class="sync-dot pulsing"></span>
      <span id="sync-label">...</span>
    </div>
    <button class="btn-manage" onclick="openManagePanel()">⚙ Gestisci</button>
  </div>
</header>

<div class="container">

  <!-- CLASSIFICA -->
  <div class="section-header">
    <span class="section-title">Classifica</span>
    <span id="races-progress" style="font-size:12px;color:#aaa;"></span>
  </div>
  <div class="standings-card" id="standings-container"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label"></div>

  <!-- GRAFICO -->
  <div class="section-header" style="margin-top:28px;">
    <span class="section-title">Andamento Punti</span>
  </div>
  <div class="chart-card">
    <div class="chart-legend" id="chart-legend"></div>
    <div class="chart-wrap">
      <canvas id="chart-canvas"></canvas>
    </div>
  </div>

  <!-- GARE -->
  <div class="section-header">
    <span class="section-title">Gare</span>
    <span id="races-count" style="font-size:12px;color:#aaa;"></span>
  </div>
  <div class="races-grid" id="races-grid"></div>

</div>

<!-- ═══ PANNELLO GESTIONE ═══ -->
<div class="manage-panel" id="manage-panel">
  <div class="manage-inner">
    <div class="manage-drag-bar"></div>
    <div class="manage-header">
      <h2>Gestisci Gare</h2>
      <button style="background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:0 4px;" onclick="closeManagePanel()">×</button>
    </div>
    <div class="manage-body">
      <p class="manage-hint">Tieni premuto ≡ e trascina per riordinare</p>
      <ul class="sort-list" id="sort-list"></ul>
      <button class="manage-add-btn" onclick="openAddRaceModal()">
        <span style="font-size:20px;line-height:1;">+</span> Aggiungi circuito
      </button>
    </div>
  </div>
</div>

<!-- ═══ MODAL RISULTATO ═══ -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-drag-bar"></div>
    <button class="modal-close" onclick="closeModal('result-modal')">×</button>
    <h2 id="result-modal-title">Risultato</h2>
    <p class="modal-sub" id="result-modal-sub"></p>
    <div class="field">
      <label>🥇 1° Posto</label>
      <select id="result-first"></select>
    </div>
    <div class="field">
      <label>🥈 2° Posto</label>
      <select id="result-second"></select>
    </div>
    <button class="btn-primary" onclick="saveResult()">Salva Risultato</button>
  </div>
</div>

<!-- ═══ MODAL AGGIUNGI GARA ═══ -->
<div class="modal-overlay" id="add-race-modal">
  <div class="modal">
    <div class="modal-drag-bar"></div>
    <button class="modal-close" onclick="closeModal('add-race-modal')">×</button>
    <h2>Nuovo Circuito</h2>
    <p class="modal-sub">Inserisci il nome e scegli l'immagine</p>
    <div class="field">
      <label>Nome del Circuito</label>
      <input type="text" id="add-race-name" placeholder="Es. Barcellona" />
    </div>
    <div class="field">
      <label>Immagine</label>
      <div class="img-picker-grid" id="img-picker-grid"></div>
      <input type="text" id="add-race-img-manual" placeholder="Oppure scrivi il nome file: es. barcellona.png"
             style="margin-top:10px;" oninput="onManualImgInput()" />
    </div>
    <button class="btn-primary" onclick="saveNewRace()">Aggiungi Circuito</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────
const API_KEY  = '$2a$10$FowpfhX4oEw6F57VyJMu7.OBOOVQllDEllfm6Nm9tXjtwWKGZwTb6';
const BIN_ID   = '69d94980856a6821891db7ff';
const BASE_URL = 'https://api.jsonbin.io/v3';
const PLAYER_COLORS = ['#e63946', '#1d7eda'];

// Lista immagini presenti in /images/ — aggiorna se aggiungi file
const KNOWN_IMAGES = [
  'lemans.png','monza.png','nurburgring.png','spa.png',
  'suzuka.png','A1ring.png','interlagos.png','lagomaggiore.png','tsukuba.png'
];

const INITIAL_STATE = {
  championship: '10 Gare', season: '2026',
  players: ['Stefano', 'Marco'],
  races: [
    { id:'r_1', name:'Le Mans',            img:'lemans.png',       result:null },
    { id:'r_2', name:'Monza',              img:'monza.png',        result:null },
    { id:'r_3', name:'Nürburgring',        img:'nurburgring.png',  result:null },
    { id:'r_4', name:'Spa',               img:'spa.png',          result:null },
    { id:'r_5', name:'Suzuka',            img:'suzuka.png',       result:null },
    { id:'r_6', name:'A1 Ring',           img:'A1ring.png',       result:null },
    { id:'r_7', name:'Interlagos',        img:'interlagos.png',   result:null },
    { id:'r_8', name:'Lago Maggiore',     img:'lagomaggiore.png', result:null },
    { id:'r_9', name:'100 Giri di Tsukuba', img:'tsukuba.png',    result:null }
  ]
};

let state = JSON.parse(JSON.stringify(INITIAL_STATE));
let resultingRaceId = null;
let saveTimeout = null;
let chartInstance = null;
let selectedImg = '';

// ── BOOT ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    state = await readBin();
    if (!state.races.find(r => r.id === 'r_9')) {
      state.races.push({ id:'r_9', name:'100 Giri di Tsukuba', img:'tsukuba.png', result:null });
      await writeBin();
    }
    render();
    setSyncStatus('ok', 'Online');
  } catch(e) {
    setSyncStatus('error', 'Errore rete');
    render();
  }
  hideLoading();
});

// ── JSONBIN ───────────────────────────────────────
async function readBin() {
  const res = await fetch(`${BASE_URL}/b/${BIN_ID}/latest`, { headers:{'X-Master-Key':API_KEY} });
  if (!res.ok) throw new Error('read ' + res.status);
  return (await res.json()).record;
}
async function writeBin() {
  const res = await fetch(`${BASE_URL}/b/${BIN_ID}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body: JSON.stringify(state)
  });
  if (!res.ok) throw new Error('write ' + res.status);
}
function scheduleSave() {
  setSyncStatus('saving', 'Salvataggio...');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      await writeBin();
      setSyncStatus('ok', 'Salvato ✓');
      setTimeout(() => setSyncStatus('ok', 'Online'), 2000);
    } catch(e) { setSyncStatus('error', 'Errore salvataggio'); }
  }, 600);
}

// ── RENDER ────────────────────────────────────────
function render() {
  document.getElementById('hdr-title').textContent  = state.championship;
  document.getElementById('hdr-season').textContent = state.season;
  renderStandings();
  renderChart();
  renderRaces();
}

function calcStandings() {
  const pts = {};
  state.players.forEach(p => pts[p] = 0);
  state.races.forEach(r => {
    if (r.result && r.result.first) pts[r.result.first] = (pts[r.result.first]||0) + 1;
  });
  return state.players.map(p => ({name:p, pts:pts[p]||0})).sort((a,b)=>b.pts-a.pts);
}

function renderStandings() {
  const s = calcStandings();
  const done = state.races.filter(r=>r.result).length;
  const total = state.races.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('races-progress').textContent = done+'/'+total+' gare completate';
  document.getElementById('progress-fill').style.width  = pct+'%';
  document.getElementById('progress-label').textContent = pct+'% del campionato completato';
  document.getElementById('standings-container').innerHTML = s.map((p,i) => {
    const wins = state.races.filter(r=>r.result&&r.result.first===p.name).length;
    const tie  = s.length>1 && s[0].pts===s[1].pts;
    return `<div class="standings-row ${i===0&&!tie?'leader':''}">
      <div class="pos ${i===0?'first':i===1?'second':''}">${i===0?'🏆':i+1}</div>
      <div>
        <div class="driver-name">${p.name}</div>
        <div class="driver-sub">${wins} vittori${wins!==1?'e':'a'}</div>
      </div>
      <div class="pts">${p.pts}<br><span>punt${p.pts!==1?'i':'o'}</span></div>
    </div>`;
  }).join('');
}

// ── GRAFICO ───────────────────────────────────────
function renderChart() {
  const races   = state.races;
  const players = state.players;

  const labels = ['Start'];
  const series = {};
  players.forEach(p => series[p] = [0]);

  const running = {};
  players.forEach(p => running[p] = 0);

  // Trova indice ultima gara con risultato
  let lastDoneIdx = -1;
  races.forEach((r, i) => { if (r.result) lastDoneIdx = i; });

  races.forEach((r, i) => {
    const short = r.name.length > 11 ? r.name.substring(0,10)+'…' : r.name;
    labels.push(short);
    if (r.result && r.result.first) running[r.result.first]++;
    players.forEach(p => {
      // Dopo l'ultima gara disputata metti null — la linea si interrompe
      series[p].push(i <= lastDoneIdx ? running[p] : null);
    });
  });

  // Legenda
  document.getElementById('chart-legend').innerHTML = players.map((p,i) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${PLAYER_COLORS[i%PLAYER_COLORS.length]}"></div>
      ${p}
    </div>`
  ).join('');

  const maxPts = Math.max(1, ...players.map(p => running[p]));

  const datasets = players.map((p,i) => ({
    label: p,
    data: series[p],
    borderColor: PLAYER_COLORS[i%PLAYER_COLORS.length],
    backgroundColor: 'transparent',
    borderWidth: 2.5,
    pointRadius: (ctx) => ctx.dataIndex === 0 ? 0 : 5,
    pointHoverRadius: 7,
    pointBackgroundColor: PLAYER_COLORS[i%PLAYER_COLORS.length],
    pointBorderColor: '#fff',
    pointBorderWidth: 2,
    tension: 0,       // linee rette
    fill: false,
    stepped: false,
    spanGaps: false
  }));

  if (chartInstance) {
    chartInstance.data.labels   = labels;
    chartInstance.data.datasets = datasets;
    chartInstance.options.scales.y.max = maxPts + 1;
    chartInstance.update('active');
    return;
  }

  const ctx = document.getElementById('chart-canvas').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          titleColor: '#fff',
          bodyColor: '#ccc',
          padding: 10,
          cornerRadius: 10,
          filter: (item) => item.dataIndex > 0,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} punt${ctx.parsed.y!==1?'i':'o'}`
          }
        }
      },
      scales: {
        x: {
          grid: { color:'#f0ede6' },
          ticks: { color:'#aaa', font:{size:11}, maxRotation:35, minRotation:20 }
        },
        y: {
          min: 0, max: maxPts + 1,
          ticks: {
            color:'#aaa', font:{size:12}, stepSize:1,
            callback: v => Number.isInteger(v) ? v : ''
          },
          grid: { color:'#f0ede6' }
        }
      }
    }
  });
}

// ── GARE ──────────────────────────────────────────
function renderRaces() {
  document.getElementById('races-count').textContent = state.races.length+' circuiti';
  document.getElementById('races-grid').innerHTML = state.races.map((r,idx) => {
    const imgBlock = `<div class="race-img-wrap">
      <img src="images/${r.img}" alt="${r.name}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="race-img-placeholder" style="display:none">🏁</div>
    </div>`;
    let resultBlock;
    if (r.result) {
      resultBlock = `<div class="result-block">
        <div class="result-row">
          <div style="display:flex;align-items:center;">
            <span class="result-pos-badge badge-1">1°</span>
            <span class="result-driver">${r.result.first}</span>
          </div>
          <span class="result-pts gold">+1 pt</span>
        </div>
        <div class="result-row">
          <div style="display:flex;align-items:center;">
            <span class="result-pos-badge badge-2">2°</span>
            <span class="result-driver">${r.result.second}</span>
          </div>
          <span class="result-pts">0 pt</span>
        </div>
      </div>`;
    } else {
      resultBlock = `<div class="result-block"><div class="no-result">Risultato non inserito</div></div>`;
    }
    const badge = r.result
      ? `<span class="status-badge status-done"><span class="status-dot"></span>Completata</span>`
      : `<span class="status-badge status-pending"><span class="status-dot"></span>In attesa</span>`;
    const btnClass = r.result ? 'btn-result has-result' : 'btn-result';
    const btnLabel = r.result ? '✎ Modifica risultato' : '+ Inserisci risultato';
    return `<div class="race-card">
      ${imgBlock}
      <div class="race-content">
        <div class="race-meta">
          <span class="race-num-label">Gara ${idx+1}</span>
          ${badge}
        </div>
        <div class="race-name">${r.name}</div>
        ${resultBlock}
      </div>
      <div class="race-footer">
        <button class="${btnClass}" onclick="openResult('${r.id}')">${btnLabel}</button>
      </div>
    </div>`;
  }).join('');
}

// ── RISULTATO ─────────────────────────────────────
function openResult(id) {
  resultingRaceId = id;
  const r = state.races.find(r=>r.id===id); if (!r) return;
  document.getElementById('result-modal-title').textContent = r.name;
  document.getElementById('result-modal-sub').textContent   = 'Gara '+(state.races.indexOf(r)+1)+' · Chi ha vinto?';
  const s1 = document.getElementById('result-first');
  const s2 = document.getElementById('result-second');
  s1.innerHTML = s2.innerHTML = state.players.map(p=>`<option value="${p}">${p}</option>`).join('');
  if (r.result) { s1.value=r.result.first; s2.value=r.result.second; }
  else          { s1.value=state.players[0]; s2.value=state.players[1]; }
  openModal('result-modal');
}
function saveResult() {
  const first  = document.getElementById('result-first').value;
  const second = document.getElementById('result-second').value;
  if (first===second) { showToast('1° e 2° non possono essere lo stesso pilota'); return; }
  const r = state.races.find(r=>r.id===resultingRaceId);
  if (r) r.result = {first, second};
  scheduleSave(); render(); closeModal('result-modal'); showToast('Risultato salvato!');
}

// ── PANNELLO GESTIONE ─────────────────────────────
function openManagePanel() {
  renderSortList();
  document.getElementById('manage-panel').classList.add('open');
}
function closeManagePanel() {
  document.getElementById('manage-panel').classList.remove('open');
}

function renderSortList() {
  const list = document.getElementById('sort-list');
  list.innerHTML = state.races.map((r, idx) => {
    const thumbInner = `<img src="images/${r.img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="sort-thumb-placeholder" style="display:none">🏁</div>`;
    return `<li class="sort-item" data-id="${r.id}"
        draggable="true"
        ondragstart="sortDragStart(event,'${r.id}')"
        ondragend="sortDragEnd(event)"
        ondragover="sortDragOver(event,'${r.id}')"
        ondrop="sortDrop(event,'${r.id}')">
      <span class="sort-handle"
        ontouchstart="sortTouchStart(event,'${r.id}')"
        ontouchmove="sortTouchMove(event)"
        ontouchend="sortTouchEnd(event)">≡</span>
      <div class="sort-thumb">${thumbInner}</div>
      <span class="sort-name">${r.name}</span>
      <span class="sort-num">${idx+1}</span>
    </li>`;
  }).join('');
}

// Drag desktop per sort list
let sortDragSrcId = null;
function sortDragStart(e, id) {
  sortDragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.sort-item').classList.add('dragging-sort'), 0);
}
function sortDragEnd(e) {
  document.querySelectorAll('.sort-item').forEach(el => el.classList.remove('dragging-sort','drag-over-sort'));
}
function sortDragOver(e, id) {
  e.preventDefault();
  document.querySelectorAll('.sort-item').forEach(el => el.classList.remove('drag-over-sort'));
  if (id !== sortDragSrcId) {
    const el = document.querySelector(`.sort-item[data-id="${id}"]`);
    if (el) el.classList.add('drag-over-sort');
  }
}
function sortDrop(e, targetId) {
  e.preventDefault();
  if (!sortDragSrcId || sortDragSrcId===targetId) return;
  doReorder(sortDragSrcId, targetId);
}

// Touch per sort list (solo l'handle ≡)
let sortTouchId   = null;
let sortTouchClone = null;
function sortTouchStart(e, id) {
  e.stopPropagation();
  sortTouchId = id;
  const item = e.target.closest('.sort-item');
  const rect = item.getBoundingClientRect();
  sortTouchClone = item.cloneNode(true);
  sortTouchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;
    width:${rect.width}px;opacity:0.75;pointer-events:none;z-index:999;
    border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,0.18);`;
  document.body.appendChild(sortTouchClone);
  item.style.opacity = '0.3';
}
function sortTouchMove(e) {
  if (!sortTouchClone) return;
  e.preventDefault();
  const t = e.touches[0];
  sortTouchClone.style.left = (t.clientX - sortTouchClone.offsetWidth/2)+'px';
  sortTouchClone.style.top  = (t.clientY - sortTouchClone.offsetHeight/2)+'px';
  document.querySelectorAll('.sort-item').forEach(el => el.classList.remove('drag-over-sort'));
  sortTouchClone.style.display = 'none';
  const el = document.elementFromPoint(t.clientX, t.clientY);
  sortTouchClone.style.display = '';
  const target = el && el.closest('.sort-item');
  if (target && target.dataset.id !== sortTouchId) target.classList.add('drag-over-sort');
}
function sortTouchEnd(e) {
  if (!sortTouchId) return;
  const t = e.changedTouches[0];
  if (sortTouchClone) { sortTouchClone.remove(); sortTouchClone = null; }
  document.querySelectorAll('.sort-item').forEach(el => {
    el.style.opacity = ''; el.classList.remove('drag-over-sort','dragging-sort');
  });
  sortTouchClone && sortTouchClone.style && (sortTouchClone.style.display='none');
  const el2 = document.elementFromPoint(t.clientX, t.clientY);
  const target = el2 && el2.closest('.sort-item');
  if (target && target.dataset.id && target.dataset.id !== sortTouchId) {
    doReorder(sortTouchId, target.dataset.id);
  }
  sortTouchId = null;
}

function doReorder(srcId, tgtId) {
  const si = state.races.findIndex(r=>r.id===srcId);
  const ti = state.races.findIndex(r=>r.id===tgtId);
  if (si===-1||ti===-1) return;
  const moved = state.races.splice(si,1)[0];
  state.races.splice(ti,0,moved);
  scheduleSave();
  render();
  renderSortList();
  showToast('Ordine aggiornato');
}

// ── AGGIUNGI GARA ─────────────────────────────────
function openAddRaceModal() {
  document.getElementById('add-race-name').value = '';
  document.getElementById('add-race-img-manual').value = '';
  selectedImg = '';
  buildImgPicker();
  closeManagePanel();
  setTimeout(() => openModal('add-race-modal'), 180);
}

function buildImgPicker() {
  // Raccoglie le immagini note + quelle già usate nelle gare
  const imgs = new Set(KNOWN_IMAGES);
  state.races.forEach(r => { if (r.img) imgs.add(r.img); });
  const grid = document.getElementById('img-picker-grid');
  grid.innerHTML = [...imgs].map(img => {
    const label = img.replace(/\.(png|jpg|jpeg|webp)$/i,'');
    return `<div class="img-picker-item" data-img="${img}" onclick="selectImg('${img}')">
      <img src="images/${img}" alt="${label}" onerror="this.style.display='none'">
      <div class="img-label">${label}</div>
      <div class="img-picker-check">✓</div>
    </div>`;
  }).join('');
}

function selectImg(img) {
  selectedImg = img;
  document.getElementById('add-race-img-manual').value = img;
  document.querySelectorAll('.img-picker-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.img === img);
  });
}

function onManualImgInput() {
  const val = document.getElementById('add-race-img-manual').value.trim();
  selectedImg = val;
  document.querySelectorAll('.img-picker-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.img === val);
  });
}

function saveNewRace() {
  const name = document.getElementById('add-race-name').value.trim();
  const img  = document.getElementById('add-race-img-manual').value.trim() || selectedImg;
  if (!name) { showToast('Inserisci il nome del circuito'); return; }
  if (!img)  { showToast('Scegli o inserisci un\'immagine'); return; }
  const id = 'r_' + Date.now();
  state.races.push({ id, name, img, result: null });
  // Aggiorna lista immagini note
  if (!KNOWN_IMAGES.includes(img)) KNOWN_IMAGES.push(img);
  scheduleSave();
  render();
  closeModal('add-race-modal');
  showToast('Circuito aggiunto!');
}

// ── UTILS ─────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showLoading()  { document.getElementById('loading-overlay').classList.add('open'); }
function hideLoading()  { document.getElementById('loading-overlay').classList.remove('open'); }

function setSyncStatus(type, label) {
  const badge = document.getElementById('sync-badge');
  const dot   = badge.querySelector('.sync-dot');
  badge.className = 'sync-badge sync-'+type;
  dot.className   = 'sync-dot'+(type==='saving'||type==='loading'?' pulsing':'');
  document.getElementById('sync-label').textContent = label;
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=>t.classList.remove('show'), 2500);
}

// Chiudi modal/panel toccando lo sfondo
['result-modal','add-race-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target===this) closeModal(id);
  });
});
document.getElementById('manage-panel').addEventListener('click', function(e) {
  if (e.target===this) closeManagePanel();
});
</script>
