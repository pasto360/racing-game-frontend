<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Gare 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: baseline; gap: 8px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  header .subtitle { font-size: 13px; color: #888; }

  .sync-badge {
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px; font-weight: 500;
  }
  .sync-ok      { background: rgba(46,160,67,0.25);  color: #a3f0b0; }
  .sync-saving  { background: rgba(255,200,0,0.2);   color: #ffd96a; }
  .sync-error   { background: rgba(255,80,80,0.2);   color: #ff9a9a; }
  .sync-loading { background: rgba(255,255,255,0.1); color: #aaa; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-dot.pulsing { animation: pulse 1s infinite; }

  .container { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: #888;
  }

  /* CLASSIFICA */
  .standings-card {
    background: #fff; border-radius: 16px; overflow: hidden;
    border: 1px solid #e8e6e0; margin-bottom: 12px;
  }
  .standings-row {
    display: grid; grid-template-columns: 48px 1fr 100px;
    align-items: center; padding: 16px 24px;
    border-bottom: 1px solid #f0ede6; transition: background 0.15s;
  }
  .standings-row:last-child { border-bottom: none; }
  .standings-row.leader { background: #fffbe6; }
  .pos { font-size: 22px; font-weight: 700; color: #ccc; }
  .pos.first  { color: #d4a017; }
  .pos.second { color: #999; }
  .driver-name { font-size: 18px; font-weight: 600; }
  .driver-sub  { font-size: 13px; color: #999; margin-top: 3px; }
  .pts { text-align: right; font-size: 26px; font-weight: 700; }
  .pts span { font-size: 13px; font-weight: 400; color: #999; }

  /* PROGRESS */
  .progress-bar { height: 6px; background: #e8e6e0; border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 3px; transition: width 0.5s ease; }
  .progress-label { font-size: 12px; color: #aaa; margin-top: 6px; text-align: right; }

  /* GARE GRID */
  .races-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 12px;
  }
  .race-card {
    background: #fff; border-radius: 16px; border: 1px solid #e8e6e0;
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .race-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  /* Immagine più grande */
  .race-img-wrap {
    width: 100%;
    height: 130px;
    background: #e8e6e0;
    overflow: hidden;
    position: relative;
  }
  .race-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: transform 0.3s ease;
  }
  .race-card:hover .race-img-wrap img { transform: scale(1.03); }
  .race-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; background: #f0ede6;
  }

  .race-content { padding: 14px 16px; }
  .race-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .race-num-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #bbb; text-transform: uppercase; }
  .race-name { font-size: 16px; font-weight: 700; margin-bottom: 10px; }

  .result-block { padding: 10px 0 0; border-top: 1px solid #f0ede6; }
  .result-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .result-pos-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    font-size: 11px; font-weight: 700; margin-right: 8px; flex-shrink: 0;
  }
  .badge-1 { background: #fff3cd; color: #856404; }
  .badge-2 { background: #ebebeb; color: #555; }
  .result-driver { font-size: 14px; font-weight: 500; }
  .result-pts      { font-size: 13px; color: #bbb; }
  .result-pts.gold { color: #d4a017; font-weight: 700; }
  .no-result { font-size: 13px; color: #ccc; padding: 8px 0; text-align: center; }

  .race-footer { padding: 10px 16px; border-top: 1px solid #f0ede6; }
  .btn-result {
    width: 100%; padding: 9px; border-radius: 10px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: opacity 0.15s;
    background: #1a1a1a; color: #fff;
  }
  .btn-result:hover { opacity: 0.82; }
  .btn-result.has-result { background: #f0ede6; color: #555; }

  /* STATUS BADGE */
  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; padding: 3px 7px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-done    { background: #e8f5e9; color: #2e7d32; }
  .status-pending { background: #f3f4f6; color: #aaa; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 18px; width: 100%;
    max-width: 400px; padding: 28px; position: relative;
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal .circuit-sub { font-size: 13px; color: #aaa; margin-bottom: 22px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
    border-radius: 50%; border: none; background: #f0ede6; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center; color: #555;
  }
  .modal-close:hover { background: #e0ddd6; }

  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .field { margin-bottom: 16px; }
  select {
    width: 100%; padding: 11px 12px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 15px; outline: none; transition: border-color 0.15s; background: #fff; cursor: pointer;
  }
  select:focus { border-color: #1a1a1a; }

  .btn-primary {
    width: 100%; padding: 13px; background: #1a1a1a; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* LOADING */
  .loading-overlay {
    display: none; position: fixed; inset: 0; background: rgba(245,244,240,0.92);
    z-index: 400; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  .loading-overlay.open { display: flex; }
  .spinner {
    width: 38px; height: 38px; border: 3px solid #ddd;
    border-top-color: #1a1a1a; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 30px;
    font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s ease; z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .races-grid { grid-template-columns: 1fr; }
    .race-img-wrap { height: 160px; }
  }
</style>
</head>
<body>

<div class="loading-overlay open" id="loading-overlay">
  <div class="spinner"></div>
  <span style="font-size:14px;color:#888;">Caricamento campionato...</span>
</div>

<header>
  <div class="header-left">
    <h1 id="hdr-title">10 Gare</h1>
    <span class="subtitle" id="hdr-season">2026</span>
  </div>
  <div class="sync-badge sync-loading" id="sync-badge">
    <span class="sync-dot pulsing"></span>
    <span id="sync-label">...</span>
  </div>
</header>

<div class="container">
  <div class="section-header">
    <span class="section-title">Classifica</span>
    <span id="races-progress" style="font-size:12px;color:#aaa;"></span>
  </div>
  <div class="standings-card" id="standings-container"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label"></div>

  <div class="section-header" style="margin-top:32px;">
    <span class="section-title">Gare</span>
    <span id="races-count" style="font-size:12px;color:#aaa;"></span>
  </div>
  <div class="races-grid" id="races-grid"></div>
</div>

<!-- MODAL RISULTATO -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="result-modal-title">Inserisci Risultato</h2>
    <p class="circuit-sub" id="result-modal-sub"></p>
    <div class="field">
      <label>🥇 1° Posto</label>
      <select id="result-first"></select>
    </div>
    <div class="field">
      <label>🥈 2° Posto</label>
      <select id="result-second"></select>
    </div>
    <button class="btn-primary" onclick="saveResult()">Salva Risultato</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG HARDCODED ───────────────────────────────
const API_KEY  = '$2a$10$FowpfhX4oEw6F57VyJMu7.OBOOVQllDEllfm6Nm9tXjtwWKGZwTb6';
const BASE_URL = 'https://api.jsonbin.io/v3';

// Dati iniziali (usati solo se il BIN non esiste ancora)
const INITIAL_STATE = {
  championship: '10 Gare',
  season: '2026',
  players: ['Stefano', 'Marco'],
  races: [
    { id: 'r_1', name: 'Le Mans',       img: 'lemans.png',      result: null },
    { id: 'r_2', name: 'Monza',          img: 'monza.png',       result: null },
    { id: 'r_3', name: 'Nürburgring',    img: 'nurburgring.png', result: null },
    { id: 'r_4', name: 'Spa',            img: 'spa.png',         result: null },
    { id: 'r_5', name: 'Suzuka',         img: 'suzuka.png',      result: null },
    { id: 'r_6', name: 'A1 Ring',        img: 'A1ring.png',      result: null },
    { id: 'r_7', name: 'Interlagos',     img: 'interlagos.png',  result: null },
    { id: 'r_8', name: 'Lago Maggiore',      img: 'lagomaggiore.png', result: null },
    { id: 'r_9', name: '100 Giri di Tsukuba', img: 'tsukuba.png',      result: null }
  ]
};

// ── STATE ─────────────────────────────────────────
let state = JSON.parse(JSON.stringify(INITIAL_STATE));
const BIN_ID = '69d94980856a6821891db7ff';
let resultingRaceId = null;
let saveTimeout = null;

// ── BOOT ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    state = await readBin();
    // Migrazione: aggiungi Tsukuba se non presente
    if (!state.races.find(r => r.id === 'r_9')) {
      state.races.push({ id: 'r_9', name: '100 Giri di Tsukuba', img: 'tsukuba.png', result: null });
      await writeBin();
    }
    render();
    setSyncStatus('ok', 'Online');
  } catch(e) {
    setSyncStatus('error', 'Errore rete');
    render();
  }
  hideLoading();
});

async function readBin() {
  const res = await fetch(`${BASE_URL}/b/${BIN_ID}/latest`, {
    headers: { 'X-Master-Key': API_KEY }
  });
  if (!res.ok) throw new Error('read ' + res.status);
  const json = await res.json();
  return json.record;
}

async function writeBin() {
  const res = await fetch(`${BASE_URL}/b/${BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': API_KEY
    },
    body: JSON.stringify(state)
  });
  if (!res.ok) throw new Error('write ' + res.status);
}

function scheduleSave() {
  setSyncStatus('saving', 'Salvataggio...');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      await writeBin();
      setSyncStatus('ok', 'Salvato ✓');
      setTimeout(() => setSyncStatus('ok', 'Online'), 2000);
    } catch(e) {
      setSyncStatus('error', 'Errore salvataggio');
    }
  }, 600);
}

// ── RENDER ────────────────────────────────────────
function render() {
  document.getElementById('hdr-title').textContent  = state.championship;
  document.getElementById('hdr-season').textContent = state.season;
  renderStandings();
  renderRaces();
}

function calcStandings() {
  const pts = {};
  state.players.forEach(p => pts[p] = 0);
  state.races.forEach(r => {
    if (r.result && r.result.first) pts[r.result.first] = (pts[r.result.first] || 0) + 1;
  });
  return state.players.map(p => ({ name: p, pts: pts[p] || 0 })).sort((a,b) => b.pts - a.pts);
}

function renderStandings() {
  const s     = calcStandings();
  const done  = state.races.filter(r => r.result).length;
  const total = state.races.length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('races-progress').textContent = done + '/' + total + ' gare completate';
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-label').textContent = pct + '% del campionato completato';

  document.getElementById('standings-container').innerHTML = s.map((p, i) => {
    const wins = state.races.filter(r => r.result && r.result.first === p.name).length;
    const tie  = s.length > 1 && s[0].pts === s[1].pts;
    return `<div class="standings-row ${i===0 && !tie ? 'leader' : ''}">
      <div class="pos ${i===0?'first':i===1?'second':''}">${i===0?'🏆':i+1}</div>
      <div>
        <div class="driver-name">${p.name}</div>
        <div class="driver-sub">${wins} vittori${wins!==1?'e':'a'}</div>
      </div>
      <div class="pts">${p.pts}<br><span>punt${p.pts!==1?'i':'o'}</span></div>
    </div>`;
  }).join('');
}

function renderRaces() {
  document.getElementById('races-count').textContent = state.races.length + ' circuiti';
  document.getElementById('races-grid').innerHTML = state.races.map((r, idx) => {

    const imgBlock = `<div class="race-img-wrap">
      <img src="images/${r.img}" alt="${r.name}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="race-img-placeholder" style="display:none">🏁</div>
    </div>`;

    let resultBlock;
    if (r.result) {
      resultBlock = `<div class="result-block">
        <div class="result-row">
          <div style="display:flex;align-items:center;">
            <span class="result-pos-badge badge-1">1°</span>
            <span class="result-driver">${r.result.first}</span>
          </div>
          <span class="result-pts gold">+1 pt</span>
        </div>
        <div class="result-row">
          <div style="display:flex;align-items:center;">
            <span class="result-pos-badge badge-2">2°</span>
            <span class="result-driver">${r.result.second}</span>
          </div>
          <span class="result-pts">0 pt</span>
        </div>
      </div>`;
    } else {
      resultBlock = `<div class="result-block"><div class="no-result">Risultato non inserito</div></div>`;
    }

    const badge = r.result
      ? `<span class="status-badge status-done"><span class="status-dot"></span>Completata</span>`
      : `<span class="status-badge status-pending"><span class="status-dot"></span>In attesa</span>`;

    const btnClass = r.result ? 'btn-result has-result' : 'btn-result';
    const btnLabel = r.result ? '✎ Modifica risultato' : '+ Inserisci risultato';

    return `<div class="race-card">
      ${imgBlock}
      <div class="race-content">
        <div class="race-meta">
          <span class="race-num-label">Gara ${idx+1}</span>
          ${badge}
        </div>
        <div class="race-name">${r.name}</div>
        ${resultBlock}
      </div>
      <div class="race-footer">
        <button class="${btnClass}" onclick="openResult('${r.id}')">${btnLabel}</button>
      </div>
    </div>`;
  }).join('');
}

// ── RISULTATO ─────────────────────────────────────
function openResult(id) {
  resultingRaceId = id;
  const r = state.races.find(r => r.id === id);
  if (!r) return;

  document.getElementById('result-modal-title').textContent = r.name;
  document.getElementById('result-modal-sub').textContent   = 'Gara ' + (state.races.indexOf(r)+1) + ' · Chi ha vinto?';

  const s1 = document.getElementById('result-first');
  const s2 = document.getElementById('result-second');
  s1.innerHTML = s2.innerHTML = state.players.map(p => `<option value="${p}">${p}</option>`).join('');

  if (r.result) {
    s1.value = r.result.first;
    s2.value = r.result.second;
  } else {
    s1.value = state.players[0];
    s2.value = state.players[1];
  }

  document.getElementById('result-modal').classList.add('open');
}

function saveResult() {
  const first  = document.getElementById('result-first').value;
  const second = document.getElementById('result-second').value;
  if (first === second) {
    showToast('1° e 2° non possono essere lo stesso pilota');
    return;
  }
  const r = state.races.find(r => r.id === resultingRaceId);
  if (r) r.result = { first, second };
  scheduleSave();
  render();
  closeModal();
  showToast('Risultato salvato!');
}

// ── UTILS ─────────────────────────────────────────
function closeModal() {
  document.getElementById('result-modal').classList.remove('open');
}
function showLoading()  { document.getElementById('loading-overlay').classList.add('open'); }
function hideLoading()  { document.getElementById('loading-overlay').classList.remove('open'); }

function setSyncStatus(type, label) {
  const badge = document.getElementById('sync-badge');
  const dot   = badge.querySelector('.sync-dot');
  badge.className = 'sync-badge sync-' + type;
  dot.className   = 'sync-dot' + (type==='saving'||type==='loading' ? ' pulsing' : '');
  document.getElementById('sync-label').textContent = label;
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('result-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
